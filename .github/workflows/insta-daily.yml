name: 인스타 자동화 (매일)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 한국시간 오전 9시
  workflow_dispatch:        # 수동 실행 단추

permissions:
  contents: write

concurrency:
  group: insta-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 글꼴 설치
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-nanum

      - name: 프로그램 준비
        run: pip install --quiet apify-client pillow requests

      - name: 인스타 자동화 실행
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python insta/automation.py
